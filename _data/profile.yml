short_bio: >-
  <p>
    Welcome! I am currently a fourth-year Ph.D. candidate in Finance at The Chinese University of Hong Kong (CUHK). Before joining CUHK, I received my M.Sc. in Financial Engineering from Nanyang Technological University and B.A. in Finance from Zhejiang University. I was a visiting Ph.D. student in Finance at Cornell University in 2024-2025.
  </p>
  <p>
    My research interests fall into empirical asset pricing, empirical corporate finance, high-frequency data, and market microstructure.
  </p>

